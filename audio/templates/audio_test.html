<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Transcription Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #111;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 1.75rem;
    }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .dot.recording { background: #ef4444; animation: pulse 1s infinite; }
    .dot.ready     { background: #22c55e; }
    .dot.loading   { background: #f59e0b; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-text {
      font-size: 0.875rem;
      color: #555;
    }

    .timer {
      margin-left: auto;
      font-size: 0.875rem;
      font-variant-numeric: tabular-nums;
      color: #ef4444;
      font-weight: 600;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      transition: opacity .15s, transform .1s;
    }
    button:active  { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-record { background: #ef4444; color: #fff; }
    .btn-stop   { background: #6b7280; color: #fff; }
    .btn-transcribe { background: #2563eb; color: #fff; }

    /* Audio preview */
    audio {
      width: 100%;
      margin-bottom: 1.25rem;
      display: none;
    }
    audio.visible { display: block; }

    /* Transcript area */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      color: #111;
      resize: vertical;
      line-height: 1.5;
      transition: border-color .15s;
    }
    textarea:focus { outline: none; border-color: #2563eb; }

    /* Error */
    .error-box {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #b91c1c;
      font-size: 0.875rem;
      margin-top: 1rem;
    }
    .error-box.visible { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>Audio Transcription Test</h1>
  <p class="subtitle">Record your voice &rarr; transcribe with OpenAI Whisper</p>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Ready to record</span>
    <span class="timer" id="timer" style="display:none"></span>
  </div>

  <div class="btn-row">
    <button class="btn-record" id="btnRecord">&#9679; Start Recording</button>
    <button class="btn-stop"   id="btnStop"   disabled>&#9632; Stop</button>
    <button class="btn-transcribe" id="btnTranscribe" disabled>&#9654; Transcribe</button>
  </div>

  <audio id="audioPreview" controls></audio>

  <label for="transcript">Transcript</label>
  <textarea id="transcript" placeholder="Transcription will appear here. You can also edit it manually."></textarea>

  <div class="error-box" id="errorBox"></div>
</div>

<script>
  const btnRecord    = document.getElementById("btnRecord");
  const btnStop      = document.getElementById("btnStop");
  const btnTranscribe = document.getElementById("btnTranscribe");
  const dot          = document.getElementById("dot");
  const statusText   = document.getElementById("statusText");
  const timerEl      = document.getElementById("timer");
  const audioPreview = document.getElementById("audioPreview");
  const transcript   = document.getElementById("transcript");
  const errorBox     = document.getElementById("errorBox");

  let mediaRecorder = null;
  let chunks = [];
  let timerInterval = null;
  let seconds = 0;
  let audioBlob = null;

  function setStatus(state, text) {
    dot.className = "dot " + state;
    statusText.textContent = text;
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add("visible");
  }

  function clearError() {
    errorBox.textContent = "";
    errorBox.classList.remove("visible");
  }

  function startTimer() {
    seconds = 0;
    timerEl.style.display = "inline";
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      timerEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerEl.style.display = "none";
  }

  btnRecord.addEventListener("click", async () => {
    clearError();
    audioBlob = null;
    audioPreview.classList.remove("visible");
    btnTranscribe.disabled = true;

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];

      // Prefer webm (Chrome) then ogg, fallback to default
      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : MediaRecorder.isTypeSupported("audio/webm")
        ? "audio/webm"
        : "";

      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        audioBlob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" });
        const url = URL.createObjectURL(audioBlob);
        audioPreview.src = url;
        audioPreview.classList.add("visible");
        btnTranscribe.disabled = false;
        setStatus("ready", "Recording saved — preview below");
      };

      mediaRecorder.start(100); // collect data every 100ms
      startTimer();
      setStatus("recording", "Recording…");
      btnRecord.disabled = true;
      btnStop.disabled = false;
    } catch (err) {
      showError("Microphone access denied or unavailable: " + err.message);
    }
  });

  btnStop.addEventListener("click", () => {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.stop();
    }
    stopTimer();
    btnStop.disabled = true;
    btnRecord.disabled = false;
  });

  btnTranscribe.addEventListener("click", async () => {
    if (!audioBlob) return;
    clearError();
    setStatus("loading", "Transcribing with Whisper…");
    btnTranscribe.disabled = true;
    transcript.value = "";

    const formData = new FormData();
    formData.append("audio", audioBlob, "recording.webm");

    try {
      const res = await fetch("/api/transcribe", { method: "POST", body: formData });
      const data = await res.json();
      if (data.error) {
        showError("Whisper error: " + data.error);
        setStatus("", "Error — try again");
      } else {
        transcript.value = data.transcript;
        setStatus("ready", "Transcription complete");
      }
    } catch (err) {
      showError("Network error: " + err.message);
      setStatus("", "Error — try again");
    } finally {
      btnTranscribe.disabled = false;
    }
  });
</script>
</body>
</html>
