document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Maven Pro';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"c48cdff5-af2b-4d6c-b156-b868b5bd525d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Maven Pro';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"16b44dbd-cf6e-4811-b497-60cdc9e92634\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Maven Pro';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"9dac6477-e0ff-4e97-9db6-ac9d1377a99e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg: #0b0b0d;\n    --bg-2: #111114;\n    --surface: #16161a;\n    --surface-2: #1d1d22;\n    --border: #2a2a30;\n    --border-2: #36363d;\n    --text: #ffffff;\n    --text-dim: #8a8a93;\n    --accent: #ff2d87;\n    --positive: #2bd9a6;\n    --radius: 18px;\n    --radius-lg: 24px;\n  }\n\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }\n  body {\n    font-family: \"Maven Pro\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n    font-weight: 500;\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n\n  /* ---------- Shell ---------- */\n  .app {\n    max-width: 480px;\n    margin: 0 auto;\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    position: relative;\n    padding-bottom: calc(108px + env(safe-area-inset-bottom));\n  }\n\n  /* ---------- Brand ---------- */\n  .brand {\n    text-align: center;\n    padding: 22px 20px 14px;\n  }\n  .brand h1 {\n    margin: 0;\n    font-weight: 900;\n    font-size: 26px;\n    letter-spacing: -0.5px;\n    line-height: 1;\n  }\n  .brand h1 .dot { color: var(--accent); }\n  .rainbow-bar {\n    height: 4px;\n    width: 100%;\n    background: linear-gradient(90deg,\n      #ff2d87, #ff5a3d, #ffb84d, #ffe14d, #2bd9a6, #3da9ff, #a056ff);\n  }\n\n  /* ---------- Page intro ---------- */\n  .intro {\n    padding: 26px 22px 6px;\n  }\n  .intro .eyebrow {\n    color: var(--text-dim);\n    font-size: 12px;\n    letter-spacing: 1.6px;\n    text-transform: uppercase;\n    font-weight: 700;\n  }\n  .intro h2 {\n    margin: 8px 0 6px;\n    font-size: 26px;\n    font-weight: 800;\n    letter-spacing: -0.4px;\n    line-height: 1.15;\n  }\n  .intro p {\n    margin: 0;\n    color: var(--text-dim);\n    font-size: 14px;\n    line-height: 1.5;\n  }\n\n  /* ---------- Steps ---------- */\n  .step {\n    margin: 22px 18px 0;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-lg);\n    overflow: hidden;\n    transition: border-color .25s ease, box-shadow .25s ease, transform .25s ease;\n  }\n  .step.active { border-color: var(--border-2); }\n  .step.done   { border-color: rgba(43,217,166,.35); }\n\n  .step-head {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    padding: 16px 18px;\n  }\n  .step-num {\n    width: 26px; height: 26px;\n    border-radius: 50%;\n    display: grid; place-items: center;\n    background: var(--surface-2);\n    color: var(--text-dim);\n    font-size: 12px;\n    font-weight: 800;\n    border: 1px solid var(--border);\n    flex: 0 0 auto;\n    transition: background .25s, color .25s, border-color .25s;\n  }\n  .step.done .step-num {\n    background: var(--positive);\n    color: #06231b;\n    border-color: var(--positive);\n  }\n  .step-title {\n    font-weight: 700;\n    font-size: 15px;\n    flex: 1;\n  }\n  .step-status {\n    font-size: 12px;\n    color: var(--text-dim);\n    font-weight: 600;\n  }\n  .step.done .step-status { color: var(--positive); }\n  .step-body {\n    padding: 0 18px 18px;\n  }\n\n  /* ---------- Receipt action buttons ---------- */\n  .receipt-actions {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 10px;\n  }\n  .receipt-btn {\n    background: var(--surface-2);\n    border: 1px solid var(--border);\n    color: var(--text);\n    border-radius: 16px;\n    padding: 18px 14px;\n    font: 600 14px/1.2 \"Maven Pro\", sans-serif;\n    cursor: pointer;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 10px;\n    transition: transform .12s ease, background .15s ease, border-color .15s ease;\n  }\n  .receipt-btn:hover { background: #25252b; border-color: var(--border-2); }\n  .receipt-btn:active { transform: scale(.97); }\n  .receipt-btn svg {\n    width: 26px; height: 26px;\n    stroke: var(--text);\n  }\n  .receipt-btn .label { font-size: 13px; color: var(--text); }\n  .receipt-btn .hint  { font-size: 11px; color: var(--text-dim); font-weight: 500; }\n\n  /* ---------- Receipt success card ---------- */\n  .receipt-success {\n    display: none;\n    align-items: center;\n    gap: 12px;\n    background: var(--surface-2);\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    padding: 12px;\n    animation: pop .35s cubic-bezier(.2,.8,.2,1);\n  }\n  .receipt-success.show { display: flex; }\n  .receipt-thumb {\n    width: 56px; height: 56px;\n    border-radius: 12px;\n    background:\n      repeating-linear-gradient(\n        180deg,\n        #f6f6f6 0 6px,\n        #ececec 6px 7px\n      ),\n      #fff;\n    flex: 0 0 56px;\n    position: relative;\n    overflow: hidden;\n    box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);\n  }\n  .receipt-thumb::before {\n    content: \"RECEIPT\";\n    position: absolute;\n    top: 6px; left: 0; right: 0;\n    text-align: center;\n    font: 800 7px/1 \"Maven Pro\", sans-serif;\n    letter-spacing: 1px;\n    color: #111;\n  }\n  .receipt-info { flex: 1; min-width: 0; }\n  .receipt-info .name {\n    font-weight: 700;\n    font-size: 14px;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n  }\n  .receipt-info .meta {\n    font-size: 12px;\n    color: var(--text-dim);\n    margin-top: 2px;\n  }\n  .receipt-redo {\n    background: transparent;\n    border: 0;\n    color: var(--text-dim);\n    font: 600 12px \"Maven Pro\", sans-serif;\n    cursor: pointer;\n    padding: 6px 8px;\n  }\n  .receipt-redo:hover { color: var(--text); }\n\n  /* ---------- Voice memo ---------- */\n  .voice {\n    text-align: center;\n    padding: 6px 4px 4px;\n  }\n  .voice-prompt {\n    font-size: 14px;\n    color: var(--text-dim);\n    margin: 0 0 14px;\n    min-height: 20px;\n    transition: color .25s;\n  }\n  .voice.recording .voice-prompt { color: #fff; }\n\n  /* Mic button */\n  .mic-wrap {\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin: 6px auto 14px;\n    width: 88px; height: 88px;\n  }\n  .mic-halo {\n    position: absolute;\n    inset: -10px;\n    border-radius: 50%;\n    background: conic-gradient(\n      from 0deg,\n      #ff2d87, #ff5a3d, #ffb84d, #ffe14d, #2bd9a6, #3da9ff, #a056ff, #ff2d87\n    );\n    filter: blur(10px);\n    opacity: 0;\n    transition: opacity .35s ease;\n  }\n  .voice.recording .mic-halo { opacity: .55; animation: spin 6s linear infinite; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .mic-btn {\n    position: relative;\n    width: 88px; height: 88px;\n    border-radius: 50%;\n    border: 0;\n    cursor: pointer;\n    background: linear-gradient(135deg, #ff2d87, #ff7a3d 55%, #ffb84d);\n    color: #fff;\n    display: grid;\n    place-items: center;\n    box-shadow:\n      0 14px 30px rgba(255,45,135,.45),\n      inset 0 0 0 1px rgba(255,255,255,.18);\n    transition: transform .15s ease, box-shadow .25s ease, border-radius .25s ease, background .25s ease;\n  }\n  .mic-btn:hover { transform: translateY(-1px); }\n  .mic-btn:active { transform: scale(.96); }\n  .mic-btn svg { width: 36px; height: 36px; }\n  .voice.recording .mic-btn {\n    background: #fff;\n    color: #ff2d87;\n    border-radius: 22px;\n    width: 70px; height: 70px;\n    box-shadow: 0 10px 24px rgba(255,45,135,.45);\n  }\n  .voice.recording .mic-btn .mic-icon { display: none; }\n  .voice.recording .mic-btn .stop-icon { display: block; }\n  .mic-btn .stop-icon { display: none; width: 22px; height: 22px; background: currentColor; border-radius: 4px; }\n\n  /* Waveform */\n  .wave {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 4px;\n    height: 64px;\n    margin: 4px auto 10px;\n    opacity: 0;\n    transform: translateY(6px);\n    transition: opacity .3s ease, transform .3s ease;\n  }\n  .voice.recording .wave { opacity: 1; transform: translateY(0); }\n  .wave .bar {\n    width: 5px;\n    border-radius: 3px;\n    background: var(--bar-color, #fff);\n    height: 8px;\n    transform-origin: center;\n    transition: height .12s ease;\n    will-change: height;\n  }\n\n  .timer {\n    font: 700 14px/1 \"JetBrains Mono\", monospace;\n    color: var(--text-dim);\n    letter-spacing: 1px;\n    margin-bottom: 6px;\n    min-height: 16px;\n  }\n  .voice.recording .timer { color: #fff; }\n\n  /* Voice success */\n  .voice-success {\n    display: none;\n    align-items: center;\n    gap: 12px;\n    background: var(--surface-2);\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    padding: 12px;\n    margin-top: 4px;\n    animation: pop .35s cubic-bezier(.2,.8,.2,1);\n  }\n  .voice-success.show { display: flex; }\n  .voice-success .check {\n    width: 36px; height: 36px;\n    border-radius: 50%;\n    background: var(--positive);\n    color: #06231b;\n    display: grid; place-items: center;\n    flex: 0 0 36px;\n  }\n  .voice-success .check svg { width: 18px; height: 18px; }\n  .voice-success .info { flex: 1; text-align: left; }\n  .voice-success .info .name { font-weight: 700; font-size: 14px; }\n  .voice-success .info .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }\n  .voice-redo {\n    background: transparent; border: 0;\n    color: var(--text-dim);\n    font: 600 12px \"Maven Pro\", sans-serif;\n    cursor: pointer; padding: 6px 8px;\n  }\n  .voice-redo:hover { color: var(--text); }\n\n  /* ---------- Sticky CTA ---------- */\n  .cta-wrap {\n    position: fixed;\n    left: 0; right: 0;\n    bottom: 0;\n    padding: 14px 18px calc(18px + env(safe-area-inset-bottom));\n    background: linear-gradient(180deg, rgba(11,11,13,0) 0%, rgba(11,11,13,.92) 30%, var(--bg) 70%);\n    pointer-events: none;\n    z-index: 30;\n  }\n  .cta-wrap-inner {\n    max-width: 480px;\n    margin: 0 auto;\n    pointer-events: auto;\n  }\n  .cta {\n    width: 100%;\n    border: 0;\n    border-radius: 999px;\n    padding: 16px 22px;\n    font: 800 16px/1 \"Maven Pro\", sans-serif;\n    background: #2a2a30;\n    color: #6c6c75;\n    cursor: not-allowed;\n    transition: background .25s ease, color .25s ease, transform .15s ease, box-shadow .25s ease;\n    position: relative;\n    overflow: hidden;\n  }\n  .cta.enabled {\n    background: #fff;\n    color: #0b0b0d;\n    cursor: pointer;\n    box-shadow: 0 14px 36px rgba(255,255,255,.12);\n  }\n  .cta.enabled:hover { transform: translateY(-1px); }\n  .cta.enabled:active { transform: scale(.98); }\n  /* rainbow shimmer when enabled */\n  .cta.enabled::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: linear-gradient(90deg,\n      transparent 0%,\n      rgba(255,45,135,.18) 20%,\n      rgba(255,184,77,.18) 40%,\n      rgba(43,217,166,.18) 60%,\n      rgba(61,169,255,.18) 80%,\n      transparent 100%);\n    transform: translateX(-100%);\n    animation: shimmer 2.6s ease-in-out infinite;\n  }\n  @keyframes shimmer { 50% { transform: translateX(100%); } }\n\n  /* ---------- Page-load entrance ---------- */\n  .enter { opacity: 0; transform: translateY(8px); animation: enter .5s cubic-bezier(.2,.8,.2,1) forwards; }\n  .enter.d1 { animation-delay: .05s; }\n  .enter.d2 { animation-delay: .15s; }\n  .enter.d3 { animation-delay: .25s; }\n  .enter.d4 { animation-delay: .35s; }\n  @keyframes enter { to { opacity: 1; transform: translateY(0); } }\n  @keyframes pop {\n    from { opacity: 0; transform: scale(.96); }\n    to   { opacity: 1; transform: scale(1); }\n  }\n\n  /* ---------- Hidden file input ---------- */\n  .visually-hidden {\n    position: absolute;\n    width: 1px; height: 1px;\n    padding: 0; margin: -1px;\n    overflow: hidden; clip: rect(0,0,0,0); border: 0;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"app\">\n    <header class=\"brand enter\">\n      <h1>bunq<span class=\"dot\">.<\u002Fspan><\u002Fh1>\n    <\u002Fheader>\n    <div class=\"rainbow-bar\" aria-hidden=\"true\"><\u002Fdiv>\n\n    <section class=\"intro enter d1\">\n      <div class=\"eyebrow\">SplitBill<\u002Fdiv>\n      <h2>Snap the bill,<br>tell us who had what.<\u002Fh2>\n      <p>Two quick steps and we'll do the maths. No more Excel after dinner.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- Step 1: Receipt -->\n    <section class=\"step enter d2\" id=\"step-receipt\">\n      <div class=\"step-head\">\n        <div class=\"step-num\">1<\u002Fdiv>\n        <div class=\"step-title\">Receipt<\u002Fdiv>\n        <div class=\"step-status\" id=\"receipt-status\">Required<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <!-- Action buttons -->\n        <div class=\"receipt-actions\" id=\"receipt-actions\">\n          <button class=\"receipt-btn\" id=\"btn-camera\" type=\"button\" aria-label=\"Take a photo of the receipt\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z\"><\u002Fpath>\n              <circle cx=\"12\" cy=\"13\" r=\"4\"><\u002Fcircle>\n            <\u002Fsvg>\n            <span class=\"label\">Take photo<\u002Fspan>\n            <span class=\"hint\">Use your camera<\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"receipt-btn\" id=\"btn-upload\" type=\"button\" aria-label=\"Upload a receipt photo\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath>\n              <polyline points=\"17 8 12 3 7 8\"><\u002Fpolyline>\n              <line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"><\u002Fline>\n            <\u002Fsvg>\n            <span class=\"label\">Upload<\u002Fspan>\n            <span class=\"hint\">From your phone<\u002Fspan>\n          <\u002Fbutton>\n          <!-- Real inputs, hidden but functional. capture=\"environment\" opens rear camera on mobile. -->\n          <input id=\"file-camera\" class=\"visually-hidden\" type=\"file\" accept=\"image/*\" capture=\"environment\">\n          <input id=\"file-upload\" class=\"visually-hidden\" type=\"file\" accept=\"image/*\">\n        <\u002Fdiv>\n\n        <!-- Success card -->\n        <div class=\"receipt-success\" id=\"receipt-success\" role=\"status\" aria-live=\"polite\">\n          <div class=\"receipt-thumb\"><\u002Fdiv>\n          <div class=\"receipt-info\">\n            <div class=\"name\" id=\"receipt-name\">receipt.jpg<\u002Fdiv>\n            <div class=\"meta\" id=\"receipt-meta\">Ready to scan<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"receipt-redo\" id=\"receipt-redo\" type=\"button\">Redo<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Step 2: Voice memo -->\n    <section class=\"step enter d3\" id=\"step-voice\">\n      <div class=\"step-head\">\n        <div class=\"step-num\">2<\u002Fdiv>\n        <div class=\"step-title\">Voice memo<\u002Fdiv>\n        <div class=\"step-status\" id=\"voice-status\">Required<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step-body\">\n        <div class=\"voice\" id=\"voice\">\n          <p class=\"voice-prompt\" id=\"voice-prompt\">Tell Bunq who had what<\u002Fp>\n\n          <div class=\"mic-wrap\">\n            <div class=\"mic-halo\" aria-hidden=\"true\"><\u002Fdiv>\n            <button class=\"mic-btn\" id=\"mic-btn\" type=\"button\" aria-label=\"Start recording\">\n              <svg class=\"mic-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect>\n                <path d=\"M5 11a7 7 0 0 0 14 0\"><\u002Fpath>\n                <line x1=\"12\" y1=\"18\" x2=\"12\" y2=\"22\"><\u002Fline>\n              <\u002Fsvg>\n              <div class=\"stop-icon\" aria-hidden=\"true\"><\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- Waveform: bars filled by JS so count is configurable -->\n          <div class=\"wave\" id=\"wave\" aria-hidden=\"true\"><\u002Fdiv>\n\n          <div class=\"timer\" id=\"timer\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Voice success -->\n        <div class=\"voice-success\" id=\"voice-success\" role=\"status\" aria-live=\"polite\">\n          <div class=\"check\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"info\">\n            <div class=\"name\">Voice memo recorded<\u002Fdiv>\n            <div class=\"meta\" id=\"voice-meta\">0:00 · ready to send<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"voice-redo\" id=\"voice-redo\" type=\"button\">Redo<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- Sticky CTA -->\n  <div class=\"cta-wrap enter d4\">\n    <div class=\"cta-wrap-inner\">\n      <button class=\"cta\" id=\"cta\" type=\"button\" disabled=\"\">Create invoice<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    /* ============================================================\n     * SplitBill Capture — frontend-only demo state.\n     * State shape mirrors what the backend will eventually receive:\n     *   { receipt: File|null, audio: Blob|null, audioDurationMs: number }\n     * ========================================================== */\n    const state = {\n      receipt: null,          // File from <input> or simulated mock\n      audio: null,            // Blob from MediaRecorder, or simulated mock\n      audioDurationMs: 0,\n    };\n\n    /* ---------- Receipt step ---------- */\n    const btnCamera     = document.getElementById(\"btn-camera\");\n    const btnUpload     = document.getElementById(\"btn-upload\");\n    const fileCamera    = document.getElementById(\"file-camera\");\n    const fileUpload    = document.getElementById(\"file-upload\");\n    const receiptStep   = document.getElementById(\"step-receipt\");\n    const receiptActions = document.getElementById(\"receipt-actions\");\n    const receiptSuccess = document.getElementById(\"receipt-success\");\n    const receiptStatus  = document.getElementById(\"receipt-status\");\n    const receiptName    = document.getElementById(\"receipt-name\");\n    const receiptMeta    = document.getElementById(\"receipt-meta\");\n\n    btnCamera.addEventListener(\"click\", () => fileCamera.click());\n    btnUpload.addEventListener(\"click\", () => fileUpload.click());\n\n    function handleReceipt(file) {\n      // If the user cancels the picker we get no file → fall back to a demo mock\n      // so the flow keeps working in this frontend-only demo.\n      if (!file) {\n        state.receipt = { name: \"demo-receipt.jpg\", size: 184320, mock: true };\n        receiptName.textContent = \"demo-receipt.jpg\";\n        receiptMeta.textContent = \"Demo · 180 KB\";\n      } else {\n        state.receipt = file;\n        receiptName.textContent = file.name;\n        receiptMeta.textContent = \"Ready to scan · \" + (file.size / 1024).toFixed(0) + \" KB\";\n      }\n      receiptActions.style.display = \"none\";\n      receiptSuccess.classList.add(\"show\");\n      receiptStep.classList.add(\"done\");\n      receiptStatus.textContent = \"Added\";\n      updateCta();\n    }\n\n    fileCamera.addEventListener(\"change\", e => handleReceipt(e.target.files[0]));\n    fileUpload.addEventListener(\"change\", e => handleReceipt(e.target.files[0]));\n\n    // Demo fallback: if the user just clicks the buttons in a desktop preview\n    // without choosing a file, simulate after a short delay so the demo flows.\n    [btnCamera, btnUpload].forEach(btn => {\n      btn.addEventListener(\"click\", () => {\n        // The hidden input will fire 'change' if a file is selected. If the\n        // user cancels, nothing fires — so we safely simulate after 1.2s only\n        // if no receipt has been added yet.\n        setTimeout(() => {\n          if (!state.receipt) handleReceipt(null);\n        }, 1200);\n      });\n    });\n\n    document.getElementById(\"receipt-redo\").addEventListener(\"click\", () => {\n      state.receipt = null;\n      receiptActions.style.display = \"\";\n      receiptSuccess.classList.remove(\"show\");\n      receiptStep.classList.remove(\"done\");\n      receiptStatus.textContent = \"Required\";\n      fileCamera.value = \"\"; fileUpload.value = \"\";\n      updateCta();\n    });\n\n    /* ---------- Voice memo step ---------- */\n    const voiceEl       = document.getElementById(\"voice\");\n    const voiceStep     = document.getElementById(\"step-voice\");\n    const micBtn        = document.getElementById(\"mic-btn\");\n    const wave          = document.getElementById(\"wave\");\n    const timerEl       = document.getElementById(\"timer\");\n    const promptEl      = document.getElementById(\"voice-prompt\");\n    const voiceSuccess  = document.getElementById(\"voice-success\");\n    const voiceStatus   = document.getElementById(\"voice-status\");\n    const voiceMeta     = document.getElementById(\"voice-meta\");\n\n    /* Build waveform bars with rainbow tints distributed across them */\n    const BAR_COUNT = 28;\n    const RAINBOW = [\"#ff2d87\",\"#ff5a3d\",\"#ffb84d\",\"#ffe14d\",\"#2bd9a6\",\"#3da9ff\",\"#a056ff\"];\n    for (let i = 0; i < BAR_COUNT; i++) {\n      const bar = document.createElement(\"div\");\n      bar.className = \"bar\";\n      // Map across the rainbow with a gentle bell so center bars are vivid\n      const t = i / (BAR_COUNT - 1);\n      const colorIdx = Math.round(t * (RAINBOW.length - 1));\n      bar.style.setProperty(\"--bar-color\", RAINBOW[colorIdx]);\n      wave.appendChild(bar);\n    }\n    const bars = [...wave.children];\n\n    let recording = false;\n    let recStart = 0;\n    let rafId = null;\n    let promptCycleId = null;\n\n    /* Animate bars with a smooth pseudo-speech pattern.\n     * We layer two sine waves of different frequency + a touch of noise so\n     * the waveform feels organic, not metronomic. */\n    function tickWave() {\n      const t = (performance.now() - recStart) / 1000;\n      bars.forEach((bar, i) => {\n        const phase = i * 0.45;\n        const a = Math.sin(t * 6 + phase) * 0.5 + 0.5;\n        const b = Math.sin(t * 2.3 + phase * 0.7 + 1) * 0.5 + 0.5;\n        const noise = Math.random() * 0.25;\n        // bell curve so center bars are taller on average\n        const bell = 0.55 + 0.45 * Math.sin((i / (BAR_COUNT - 1)) * Math.PI);\n        const v = (a * 0.55 + b * 0.45) * bell + noise * 0.3;\n        const h = 8 + v * 48; // 8–56px\n        bar.style.height = h.toFixed(1) + \"px\";\n      });\n\n      const elapsed = performance.now() - recStart;\n      timerEl.textContent = formatTime(elapsed);\n\n      if (recording) rafId = requestAnimationFrame(tickWave);\n    }\n\n    function formatTime(ms) {\n      const s = Math.floor(ms / 1000);\n      return Math.floor(s / 60) + \":\" + String(s % 60).padStart(2, \"0\");\n    }\n\n    /* Cycle prompt copy while recording — keeps the screen alive. */\n    const PROMPTS = [\n      \"Listening…\",\n      \"Tell Bunq who had what\",\n      \"Recording your split explanation\",\n      \"Keep going — we're listening\",\n    ];\n    function cyclePrompts() {\n      let i = 0;\n      promptEl.textContent = PROMPTS[0];\n      promptCycleId = setInterval(() => {\n        i = (i + 1) % PROMPTS.length;\n        promptEl.style.opacity = \"0\";\n        setTimeout(() => {\n          promptEl.textContent = PROMPTS[i];\n          promptEl.style.opacity = \"1\";\n        }, 180);\n      }, 2400);\n    }\n\n    /* Try to use the real MediaRecorder; fall back to a silent simulated\n     * recording so the demo still works in environments without mic access. */\n    let mediaRecorder = null;\n    let mediaChunks = [];\n    let mediaStream = null;\n\n    async function startRecording() {\n      recording = true;\n      voiceEl.classList.add(\"recording\");\n      voiceStatus.textContent = \"Recording…\";\n      micBtn.setAttribute(\"aria-label\", \"Stop recording\");\n      recStart = performance.now();\n      cyclePrompts();\n      tickWave();\n\n      // BACKEND HOOK: capture real audio if available.\n      try {\n        if (navigator.mediaDevices?.getUserMedia) {\n          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });\n          mediaRecorder = new MediaRecorder(mediaStream);\n          mediaChunks = [];\n          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) mediaChunks.push(e.data); };\n          mediaRecorder.start();\n        }\n      } catch (err) {\n        // Permission denied or unsupported — we'll just fake the blob on stop.\n        console.warn(\"[SplitBill] Mic unavailable, using simulated recording:\", err);\n      }\n    }\n\n    async function stopRecording() {\n      if (!recording) return;\n      recording = false;\n      const elapsed = performance.now() - recStart;\n      state.audioDurationMs = elapsed;\n      cancelAnimationFrame(rafId);\n      clearInterval(promptCycleId);\n      promptEl.style.opacity = \"1\";\n\n      // Settle bars to flat baseline\n      bars.forEach(b => b.style.height = \"8px\");\n\n      // Stop real recorder if it ran\n      if (mediaRecorder && mediaRecorder.state !== \"inactive\") {\n        await new Promise(resolve => {\n          mediaRecorder.onstop = () => {\n            state.audio = new Blob(mediaChunks, { type: mediaRecorder.mimeType || \"audio/webm\" });\n            resolve();\n          };\n          mediaRecorder.stop();\n        });\n        mediaStream?.getTracks().forEach(t => t.stop());\n      } else {\n        // Simulated blob so the rest of the flow has something to send\n        state.audio = new Blob([new Uint8Array(0)], { type: \"audio/webm\" });\n      }\n\n      voiceEl.classList.remove(\"recording\");\n      voiceEl.style.display = \"none\";\n      voiceSuccess.classList.add(\"show\");\n      voiceStep.classList.add(\"done\");\n      voiceStatus.textContent = \"Recorded\";\n      voiceMeta.textContent = formatTime(elapsed) + \" · ready to send\";\n      micBtn.setAttribute(\"aria-label\", \"Start recording\");\n      updateCta();\n    }\n\n    micBtn.addEventListener(\"click\", () => {\n      if (recording) stopRecording();\n      else startRecording();\n    });\n\n    document.getElementById(\"voice-redo\").addEventListener(\"click\", () => {\n      state.audio = null;\n      state.audioDurationMs = 0;\n      voiceSuccess.classList.remove(\"show\");\n      voiceEl.style.display = \"\";\n      voiceStep.classList.remove(\"done\");\n      voiceStatus.textContent = \"Required\";\n      timerEl.textContent = \"\";\n      promptEl.textContent = \"Tell Bunq who had what\";\n      updateCta();\n    });\n\n    /* ---------- CTA ---------- */\n    const cta = document.getElementById(\"cta\");\n    function updateCta() {\n      const ready = !!state.receipt && !!state.audio;\n      cta.disabled = !ready;\n      cta.classList.toggle(\"enabled\", ready);\n    }\n\n    cta.addEventListener(\"click\", () => {\n      if (cta.disabled) return;\n      console.log(\"[SplitBill] Create invoice\", {\n        receipt: state.receipt,\n        audio: state.audio,\n        audioDurationMs: state.audioDurationMs,\n      });\n      // BACKEND HOOK: replace the line below with a fetch() POST that uploads\n      // state.receipt + state.audio as multipart/form-data, then routes to the\n      // generated SplitBill page.\n      cta.textContent = \"Creating…\";\n      setTimeout(() => {\n        // Demo navigation — adjust to your real next route\n        window.location.href = \"SplitBill Receipt.html\";\n      }, 700);\n    });\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
