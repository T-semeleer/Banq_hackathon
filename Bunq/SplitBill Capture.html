<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bunq · SplitBill Capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b0d;
    --bg-2: #111114;
    --surface: #16161a;
    --surface-2: #1d1d22;
    --border: #2a2a30;
    --border-2: #36363d;
    --text: #ffffff;
    --text-dim: #8a8a93;
    --accent: #ff2d87;
    --positive: #2bd9a6;
    --radius: 18px;
    --radius-lg: 24px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: "Maven Pro", system-ui, -apple-system, "Segoe UI", sans-serif;
    font-weight: 500;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Shell ---------- */
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding-bottom: calc(108px + env(safe-area-inset-bottom));
  }

  /* ---------- Brand ---------- */
  .brand {
    text-align: center;
    padding: 22px 20px 14px;
  }
  .brand h1 {
    margin: 0;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .brand h1 .dot { color: var(--accent); }
  .rainbow-bar {
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg,
      #ff2d87, #ff5a3d, #ffb84d, #ffe14d, #2bd9a6, #3da9ff, #a056ff);
  }

  /* ---------- Page intro ---------- */
  .intro {
    padding: 26px 22px 6px;
  }
  .intro .eyebrow {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .intro h2 {
    margin: 8px 0 6px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.4px;
    line-height: 1.15;
  }
  .intro p {
    margin: 0;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ---------- Steps ---------- */
  .step {
    margin: 22px 18px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color .25s ease, box-shadow .25s ease, transform .25s ease;
  }
  .step.active { border-color: var(--border-2); }
  .step.done   { border-color: rgba(43,217,166,.35); }

  .step-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
  }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--surface-2);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 800;
    border: 1px solid var(--border);
    flex: 0 0 auto;
    transition: background .25s, color .25s, border-color .25s;
  }
  .step.done .step-num {
    background: var(--positive);
    color: #06231b;
    border-color: var(--positive);
  }
  .step-title {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
  }
  .step-status {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .step.done .step-status { color: var(--positive); }
  .step-body {
    padding: 0 18px 18px;
  }

  /* ---------- Receipt action buttons ---------- */
  .receipt-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .receipt-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 16px;
    padding: 18px 14px;
    font: 600 14px/1.2 "Maven Pro", sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .receipt-btn:hover { background: #25252b; border-color: var(--border-2); }
  .receipt-btn:active { transform: scale(.97); }
  .receipt-btn svg {
    width: 26px; height: 26px;
    stroke: var(--text);
  }
  .receipt-btn .label { font-size: 13px; color: var(--text); }
  .receipt-btn .hint  { font-size: 11px; color: var(--text-dim); font-weight: 500; }

  /* ---------- Receipt success card ---------- */
  .receipt-success {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
    animation: pop .35s cubic-bezier(.2,.8,.2,1);
  }
  .receipt-success.show { display: flex; }
  .receipt-thumb {
    width: 56px; height: 56px;
    border-radius: 12px;
    background:
      repeating-linear-gradient(
        180deg,
        #f6f6f6 0 6px,
        #ececec 6px 7px
      ),
      #fff;
    flex: 0 0 56px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
  }
  .receipt-thumb::before {
    content: "RECEIPT";
    position: absolute;
    top: 6px; left: 0; right: 0;
    text-align: center;
    font: 800 7px/1 "Maven Pro", sans-serif;
    letter-spacing: 1px;
    color: #111;
  }
  .receipt-info { flex: 1; min-width: 0; }
  .receipt-info .name {
    font-weight: 700;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .receipt-info .meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .receipt-redo {
    background: transparent;
    border: 0;
    color: var(--text-dim);
    font: 600 12px "Maven Pro", sans-serif;
    cursor: pointer;
    padding: 6px 8px;
  }
  .receipt-redo:hover { color: var(--text); }

  /* ---------- Voice memo ---------- */
  .voice {
    text-align: center;
    padding: 6px 4px 4px;
  }
  .voice-prompt {
    font-size: 14px;
    color: var(--text-dim);
    margin: 0 0 14px;
    min-height: 20px;
    transition: color .25s;
  }
  .voice.recording .voice-prompt { color: #fff; }

  /* Mic button */
  .mic-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 6px auto 14px;
    width: 88px; height: 88px;
  }
  .mic-halo {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #ff2d87, #ff5a3d, #ffb84d, #ffe14d, #2bd9a6, #3da9ff, #a056ff, #ff2d87
    );
    filter: blur(10px);
    opacity: 0;
    transition: opacity .35s ease;
  }
  .voice.recording .mic-halo { opacity: .55; animation: spin 6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .mic-btn {
    position: relative;
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 0;
    cursor: pointer;
    background: linear-gradient(135deg, #ff2d87, #ff7a3d 55%, #ffb84d);
    color: #fff;
    display: grid;
    place-items: center;
    box-shadow:
      0 14px 30px rgba(255,45,135,.45),
      inset 0 0 0 1px rgba(255,255,255,.18);
    transition: transform .15s ease, box-shadow .25s ease, border-radius .25s ease, background .25s ease;
  }
  .mic-btn:hover { transform: translateY(-1px); }
  .mic-btn:active { transform: scale(.96); }
  .mic-btn svg { width: 36px; height: 36px; }
  .voice.recording .mic-btn {
    background: #fff;
    color: #ff2d87;
    border-radius: 22px;
    width: 70px; height: 70px;
    box-shadow: 0 10px 24px rgba(255,45,135,.45);
  }
  .voice.recording .mic-btn .mic-icon { display: none; }
  .voice.recording .mic-btn .stop-icon { display: block; }
  .mic-btn .stop-icon { display: none; width: 22px; height: 22px; background: currentColor; border-radius: 4px; }

  /* Waveform */
  .wave {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 64px;
    margin: 4px auto 10px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .3s ease, transform .3s ease;
  }
  .voice.recording .wave { opacity: 1; transform: translateY(0); }
  .wave .bar {
    width: 5px;
    border-radius: 3px;
    background: var(--bar-color, #fff);
    height: 8px;
    transform-origin: center;
    transition: height .12s ease;
    will-change: height;
  }

  .timer {
    font: 700 14px/1 "JetBrains Mono", monospace;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
    min-height: 16px;
  }
  .voice.recording .timer { color: #fff; }

  /* Voice success */
  .voice-success {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
    margin-top: 4px;
    animation: pop .35s cubic-bezier(.2,.8,.2,1);
  }
  .voice-success.show { display: flex; }
  .voice-success .check {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--positive);
    color: #06231b;
    display: grid; place-items: center;
    flex: 0 0 36px;
  }
  .voice-success .check svg { width: 18px; height: 18px; }
  .voice-success .info { flex: 1; text-align: left; }
  .voice-success .info .name { font-weight: 700; font-size: 14px; }
  .voice-success .info .meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .voice-redo {
    background: transparent; border: 0;
    color: var(--text-dim);
    font: 600 12px "Maven Pro", sans-serif;
    cursor: pointer; padding: 6px 8px;
  }
  .voice-redo:hover { color: var(--text); }

  /* ---------- Sticky CTA ---------- */
  .cta-wrap {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    padding: 14px 18px calc(18px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, rgba(11,11,13,0) 0%, rgba(11,11,13,.92) 30%, var(--bg) 70%);
    pointer-events: none;
    z-index: 30;
  }
  .cta-wrap-inner {
    max-width: 480px;
    margin: 0 auto;
    pointer-events: auto;
  }
  .cta {
    width: 100%;
    border: 0;
    border-radius: 999px;
    padding: 16px 22px;
    font: 800 16px/1 "Maven Pro", sans-serif;
    background: #2a2a30;
    color: #6c6c75;
    cursor: not-allowed;
    transition: background .25s ease, color .25s ease, transform .15s ease, box-shadow .25s ease;
    position: relative;
    overflow: hidden;
  }
  .cta.enabled {
    background: #fff;
    color: #0b0b0d;
    cursor: pointer;
    box-shadow: 0 14px 36px rgba(255,255,255,.12);
  }
  .cta.enabled:hover { transform: translateY(-1px); }
  .cta.enabled:active { transform: scale(.98); }
  /* rainbow shimmer when enabled */
  .cta.enabled::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,45,135,.18) 20%,
      rgba(255,184,77,.18) 40%,
      rgba(43,217,166,.18) 60%,
      rgba(61,169,255,.18) 80%,
      transparent 100%);
    transform: translateX(-100%);
    animation: shimmer 2.6s ease-in-out infinite;
  }
  @keyframes shimmer { 50% { transform: translateX(100%); } }

  /* ---------- Page-load entrance ---------- */
  .enter { opacity: 0; transform: translateY(8px); animation: enter .5s cubic-bezier(.2,.8,.2,1) forwards; }
  .enter.d1 { animation-delay: .05s; }
  .enter.d2 { animation-delay: .15s; }
  .enter.d3 { animation-delay: .25s; }
  .enter.d4 { animation-delay: .35s; }
  @keyframes enter { to { opacity: 1; transform: translateY(0); } }
  @keyframes pop {
    from { opacity: 0; transform: scale(.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ---------- Hidden file input ---------- */
  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); border: 0;
  }
</style>
</head>
<body>
  <div class="app">
    <header class="brand enter">
      <h1>bunq<span class="dot">.</span></h1>
    </header>
    <div class="rainbow-bar" aria-hidden="true"></div>

    <section class="intro enter d1">
      <div class="eyebrow">SplitBill</div>
      <h2>Snap the bill,<br/>tell us who had what.</h2>
      <p>Two quick steps and we'll do the maths. No more Excel after dinner.</p>
    </section>

    <!-- Step 1: Receipt -->
    <section class="step enter d2" id="step-receipt">
      <div class="step-head">
        <div class="step-num">1</div>
        <div class="step-title">Receipt</div>
        <div class="step-status" id="receipt-status">Required</div>
      </div>
      <div class="step-body">
        <!-- Action buttons -->
        <div class="receipt-actions" id="receipt-actions">
          <button class="receipt-btn" id="btn-camera" type="button" aria-label="Take a photo of the receipt">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span class="label">Take photo</span>
            <span class="hint">Use your camera</span>
          </button>
          <button class="receipt-btn" id="btn-upload" type="button" aria-label="Upload a receipt photo">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span class="label">Upload</span>
            <span class="hint">From your phone</span>
          </button>
          <!-- Real inputs, hidden but functional. capture="environment" opens rear camera on mobile. -->
          <input id="file-camera" class="visually-hidden" type="file" accept="image/*" capture="environment" />
          <input id="file-upload" class="visually-hidden" type="file" accept="image/*" />
        </div>

        <!-- Success card -->
        <div class="receipt-success" id="receipt-success" role="status" aria-live="polite">
          <div class="receipt-thumb"></div>
          <div class="receipt-info">
            <div class="name" id="receipt-name">receipt.jpg</div>
            <div class="meta" id="receipt-meta">Ready to scan</div>
          </div>
          <button class="receipt-redo" id="receipt-redo" type="button">Redo</button>
        </div>
      </div>
    </section>

    <!-- Step 2: Voice memo -->
    <section class="step enter d3" id="step-voice">
      <div class="step-head">
        <div class="step-num">2</div>
        <div class="step-title">Voice memo</div>
        <div class="step-status" id="voice-status">Required</div>
      </div>
      <div class="step-body">
        <div class="voice" id="voice">
          <p class="voice-prompt" id="voice-prompt">Tell Bunq who had what</p>

          <div class="mic-wrap">
            <div class="mic-halo" aria-hidden="true"></div>
            <button class="mic-btn" id="mic-btn" type="button" aria-label="Start recording">
              <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 11a7 7 0 0 0 14 0"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
              </svg>
              <div class="stop-icon" aria-hidden="true"></div>
            </button>
          </div>

          <!-- Waveform: bars filled by JS so count is configurable -->
          <div class="wave" id="wave" aria-hidden="true"></div>

          <div class="timer" id="timer"></div>
        </div>

        <!-- Voice success -->
        <div class="voice-success" id="voice-success" role="status" aria-live="polite">
          <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="info">
            <div class="name">Voice memo recorded</div>
            <div class="meta" id="voice-meta">0:00 · ready to send</div>
          </div>
          <button class="voice-redo" id="voice-redo" type="button">Redo</button>
        </div>
      </div>
    </section>
  </div>

  <!-- Sticky CTA -->
  <div class="cta-wrap enter d4">
    <div class="cta-wrap-inner">
      <button class="cta" id="cta" type="button" disabled>Create invoice</button>
    </div>
  </div>

  <script>
    /* ============================================================
     * SplitBill Capture — frontend-only demo state.
     * State shape mirrors what the backend will eventually receive:
     *   { receipt: File|null, audio: Blob|null, audioDurationMs: number }
     * ========================================================== */
    const state = {
      receipt: null,          // File from <input> or simulated mock
      audio: null,            // Blob from MediaRecorder, or simulated mock
      audioDurationMs: 0,
    };

    /* ---------- Receipt step ---------- */
    const btnCamera     = document.getElementById("btn-camera");
    const btnUpload     = document.getElementById("btn-upload");
    const fileCamera    = document.getElementById("file-camera");
    const fileUpload    = document.getElementById("file-upload");
    const receiptStep   = document.getElementById("step-receipt");
    const receiptActions = document.getElementById("receipt-actions");
    const receiptSuccess = document.getElementById("receipt-success");
    const receiptStatus  = document.getElementById("receipt-status");
    const receiptName    = document.getElementById("receipt-name");
    const receiptMeta    = document.getElementById("receipt-meta");

    btnCamera.addEventListener("click", () => fileCamera.click());
    btnUpload.addEventListener("click", () => fileUpload.click());

    function handleReceipt(file) {
      // If the user cancels the picker we get no file → fall back to a demo mock
      // so the flow keeps working in this frontend-only demo.
      if (!file) {
        state.receipt = { name: "demo-receipt.jpg", size: 184320, mock: true };
        receiptName.textContent = "demo-receipt.jpg";
        receiptMeta.textContent = "Demo · 180 KB";
      } else {
        state.receipt = file;
        receiptName.textContent = file.name;
        receiptMeta.textContent = "Ready to scan · " + (file.size / 1024).toFixed(0) + " KB";
      }
      receiptActions.style.display = "none";
      receiptSuccess.classList.add("show");
      receiptStep.classList.add("done");
      receiptStatus.textContent = "Added";
      updateCta();
    }

    fileCamera.addEventListener("change", e => handleReceipt(e.target.files[0]));
    fileUpload.addEventListener("change", e => handleReceipt(e.target.files[0]));

    // Demo fallback: if the user just clicks the buttons in a desktop preview
    // without choosing a file, simulate after a short delay so the demo flows.
    [btnCamera, btnUpload].forEach(btn => {
      btn.addEventListener("click", () => {
        // The hidden input will fire 'change' if a file is selected. If the
        // user cancels, nothing fires — so we safely simulate after 1.2s only
        // if no receipt has been added yet.
        setTimeout(() => {
          if (!state.receipt) handleReceipt(null);
        }, 1200);
      });
    });

    document.getElementById("receipt-redo").addEventListener("click", () => {
      state.receipt = null;
      receiptActions.style.display = "";
      receiptSuccess.classList.remove("show");
      receiptStep.classList.remove("done");
      receiptStatus.textContent = "Required";
      fileCamera.value = ""; fileUpload.value = "";
      updateCta();
    });

    /* ---------- Voice memo step ---------- */
    const voiceEl       = document.getElementById("voice");
    const voiceStep     = document.getElementById("step-voice");
    const micBtn        = document.getElementById("mic-btn");
    const wave          = document.getElementById("wave");
    const timerEl       = document.getElementById("timer");
    const promptEl      = document.getElementById("voice-prompt");
    const voiceSuccess  = document.getElementById("voice-success");
    const voiceStatus   = document.getElementById("voice-status");
    const voiceMeta     = document.getElementById("voice-meta");

    /* Build waveform bars with rainbow tints distributed across them */
    const BAR_COUNT = 28;
    const RAINBOW = ["#ff2d87","#ff5a3d","#ffb84d","#ffe14d","#2bd9a6","#3da9ff","#a056ff"];
    for (let i = 0; i < BAR_COUNT; i++) {
      const bar = document.createElement("div");
      bar.className = "bar";
      // Map across the rainbow with a gentle bell so center bars are vivid
      const t = i / (BAR_COUNT - 1);
      const colorIdx = Math.round(t * (RAINBOW.length - 1));
      bar.style.setProperty("--bar-color", RAINBOW[colorIdx]);
      wave.appendChild(bar);
    }
    const bars = [...wave.children];

    let recording = false;
    let recStart = 0;
    let rafId = null;
    let promptCycleId = null;

    /* Animate bars with a smooth pseudo-speech pattern.
     * We layer two sine waves of different frequency + a touch of noise so
     * the waveform feels organic, not metronomic. */
    function tickWave() {
      const t = (performance.now() - recStart) / 1000;
      bars.forEach((bar, i) => {
        const phase = i * 0.45;
        const a = Math.sin(t * 6 + phase) * 0.5 + 0.5;
        const b = Math.sin(t * 2.3 + phase * 0.7 + 1) * 0.5 + 0.5;
        const noise = Math.random() * 0.25;
        // bell curve so center bars are taller on average
        const bell = 0.55 + 0.45 * Math.sin((i / (BAR_COUNT - 1)) * Math.PI);
        const v = (a * 0.55 + b * 0.45) * bell + noise * 0.3;
        const h = 8 + v * 48; // 8–56px
        bar.style.height = h.toFixed(1) + "px";
      });

      const elapsed = performance.now() - recStart;
      timerEl.textContent = formatTime(elapsed);

      if (recording) rafId = requestAnimationFrame(tickWave);
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
    }

    /* Cycle prompt copy while recording — keeps the screen alive. */
    const PROMPTS = [
      "Listening…",
      "Tell Bunq who had what",
      "Recording your split explanation",
      "Keep going — we're listening",
    ];
    function cyclePrompts() {
      let i = 0;
      promptEl.textContent = PROMPTS[0];
      promptCycleId = setInterval(() => {
        i = (i + 1) % PROMPTS.length;
        promptEl.style.opacity = "0";
        setTimeout(() => {
          promptEl.textContent = PROMPTS[i];
          promptEl.style.opacity = "1";
        }, 180);
      }, 2400);
    }

    /* Try to use the real MediaRecorder; fall back to a silent simulated
     * recording so the demo still works in environments without mic access. */
    let mediaRecorder = null;
    let mediaChunks = [];
    let mediaStream = null;

    async function startRecording() {
      recording = true;
      voiceEl.classList.add("recording");
      voiceStatus.textContent = "Recording…";
      micBtn.setAttribute("aria-label", "Stop recording");
      recStart = performance.now();
      cyclePrompts();
      tickWave();

      // BACKEND HOOK: capture real audio if available.
      try {
        if (navigator.mediaDevices?.getUserMedia) {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(mediaStream);
          mediaChunks = [];
          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) mediaChunks.push(e.data); };
          mediaRecorder.start();
        }
      } catch (err) {
        // Permission denied or unsupported — we'll just fake the blob on stop.
        console.warn("[SplitBill] Mic unavailable, using simulated recording:", err);
      }
    }

    async function stopRecording() {
      if (!recording) return;
      recording = false;
      const elapsed = performance.now() - recStart;
      state.audioDurationMs = elapsed;
      cancelAnimationFrame(rafId);
      clearInterval(promptCycleId);
      promptEl.style.opacity = "1";

      // Settle bars to flat baseline
      bars.forEach(b => b.style.height = "8px");

      // Stop real recorder if it ran
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        await new Promise(resolve => {
          mediaRecorder.onstop = () => {
            state.audio = new Blob(mediaChunks, { type: mediaRecorder.mimeType || "audio/webm" });
            resolve();
          };
          mediaRecorder.stop();
        });
        mediaStream?.getTracks().forEach(t => t.stop());
      } else {
        // Simulated blob so the rest of the flow has something to send
        state.audio = new Blob([new Uint8Array(0)], { type: "audio/webm" });
      }

      voiceEl.classList.remove("recording");
      voiceEl.style.display = "none";
      voiceSuccess.classList.add("show");
      voiceStep.classList.add("done");
      voiceStatus.textContent = "Recorded";
      voiceMeta.textContent = formatTime(elapsed) + " · ready to send";
      micBtn.setAttribute("aria-label", "Start recording");
      updateCta();
    }

    micBtn.addEventListener("click", () => {
      if (recording) stopRecording();
      else startRecording();
    });

    document.getElementById("voice-redo").addEventListener("click", () => {
      state.audio = null;
      state.audioDurationMs = 0;
      voiceSuccess.classList.remove("show");
      voiceEl.style.display = "";
      voiceStep.classList.remove("done");
      voiceStatus.textContent = "Required";
      timerEl.textContent = "";
      promptEl.textContent = "Tell Bunq who had what";
      updateCta();
    });

    /* ---------- CTA ---------- */
    const cta = document.getElementById("cta");
    function updateCta() {
      const ready = !!state.receipt && !!state.audio;
      cta.disabled = !ready;
      cta.classList.toggle("enabled", ready);
    }

    cta.addEventListener("click", () => {
      if (cta.disabled) return;
      console.log("[SplitBill] Create invoice", {
        receipt: state.receipt,
        audio: state.audio,
        audioDurationMs: state.audioDurationMs,
      });
      // BACKEND HOOK: replace the line below with a fetch() POST that uploads
      // state.receipt + state.audio as multipart/form-data, then routes to the
      // generated SplitBill page.
      cta.textContent = "Creating…";
      setTimeout(() => {
        // Demo navigation — adjust to your real next route
        window.location.href = "SplitBill Receipt.html";
      }, 700);
    });
  </script>
</body>
