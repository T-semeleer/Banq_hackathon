<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bunq · SplitBill Receipt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<!-- QR generator (small, no deps) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0b0b0d;
    --surface: #16161a;
    --border: #2a2a30;
    --text: #ffffff;
    --text-dim: #8a8a93;
    --accent: #ff2d87;
    --paper: #ffffff;
    --ink: #111111;
    --ink-dim: #555;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: "Maven Pro", system-ui, -apple-system, "Segoe UI", sans-serif;
    font-weight: 500;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Shell ---------- */
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    padding-bottom: 100px; /* room for floating CTA */
  }

  /* ---------- Brand ---------- */
  .brand {
    text-align: center;
    padding: 22px 20px 14px;
  }
  .brand h1 {
    margin: 0;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .brand h1 .dot { color: var(--accent); }
  .rainbow-bar {
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg,
      #ff2d87, #ff5a3d, #ffb84d, #ffe14d, #2bd9a6, #3da9ff, #a056ff);
  }

  /* ---------- Stage ---------- */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 16px;
    gap: 24px;
  }

  /* ---------- Receipt ---------- */
  .receipt-wrap {
    width: 100%;
    max-width: 320px;
    position: relative;
  }
  /* zig-zag top edge (paper tear feel) */
  .receipt-wrap::before {
    content: "";
    display: block;
    height: 10px;
    background:
      linear-gradient(135deg, var(--paper) 25%, transparent 25%) 0 0/16px 10px,
      linear-gradient(225deg, var(--paper) 25%, transparent 25%) 0 0/16px 10px;
    filter: drop-shadow(0 -1px 0 rgba(0,0,0,0));
  }
  .receipt {
    background: var(--paper);
    color: var(--ink);
    font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.55;
    padding: 22px 22px 26px;
    box-shadow:
      0 30px 60px rgba(0,0,0,.5),
      0 8px 20px rgba(0,0,0,.35);
    position: relative;
  }
  /* zig-zag bottom edge */
  .receipt-wrap::after {
    content: "";
    display: block;
    height: 10px;
    background:
      linear-gradient(45deg, var(--paper) 25%, transparent 25%) 0 0/16px 10px,
      linear-gradient(-45deg, var(--paper) 25%, transparent 25%) 0 0/16px 10px;
    background-color: transparent;
  }

  .r-head {
    text-align: center;
    border-bottom: 1px dashed #000;
    padding-bottom: 10px;
    margin-bottom: 10px;
  }
  .r-title {
    font-family: "Maven Pro", sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 4px;
    margin: 0 0 4px;
  }
  .r-sub {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.5px;
  }

  .r-section { margin: 10px 0; }
  .r-divider {
    border: 0;
    border-top: 1px dashed #000;
    margin: 10px 0;
  }
  .r-divider.solid { border-top: 1px solid #000; }

  .r-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: baseline;
    white-space: nowrap;
  }
  .r-row .name {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
    min-width: 0;
  }
  .r-row .who {
    color: var(--ink-dim);
    font-size: 10.5px;
  }
  .r-item-name { display: flex; flex-direction: column; }
  .r-row .price {
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .r-totals .r-row { font-size: 12px; }
  .r-totals .grand {
    font-weight: 700;
    font-size: 15px;
    margin-top: 6px;
  }

  .r-footer {
    text-align: center;
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--ink);
  }

  /* typewriter caret */
  .caret {
    display: inline-block;
    width: 7px;
    height: 1em;
    background: #000;
    vertical-align: -2px;
    margin-left: 1px;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* lines start hidden, revealed by JS */
  .line { opacity: 0; }
  .line.visible { opacity: 1; }

  /* ---------- QR ---------- */
  .qr-card {
    background: #fff;
    padding: 12px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,.4);
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(8px) scale(.96);
    transition: opacity .6s ease, transform .6s cubic-bezier(.2,.8,.2,1);
  }
  .qr-card.in {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .qr-card svg {
    display: block;
    width: 96px;
    height: 96px;
  }
  .qr-meta {
    color: #111;
    font-family: "Maven Pro", sans-serif;
  }
  .qr-meta .label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #666;
    font-weight: 700;
  }
  .qr-meta .id {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    font-weight: 700;
    margin-top: 2px;
  }
  .qr-meta .hint {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }

  /* ---------- Floating CTA ---------- */
  .original-btn {
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom));
    right: 16px;
    background: #fff;
    color: #111;
    border: 0;
    border-radius: 999px;
    padding: 12px 18px;
    font: 600 14px/1 "Maven Pro", sans-serif;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 12px 30px rgba(0,0,0,.5);
    z-index: 50;
    transition: transform .15s ease, background .15s ease;
  }
  .original-btn:hover { background: #f1f1f1; }
  .original-btn:active { transform: scale(.97); }
  .original-btn svg { width: 14px; height: 14px; }

  /* ---------- Modal ---------- */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
    animation: fade .25s ease;
  }
  .modal.open { display: flex; }
  .modal-card {
    background: #fff;
    border-radius: 18px;
    padding: 14px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    position: relative;
  }
  .modal-card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
  }
  .modal-close {
    position: absolute;
    top: -10px; right: -10px;
    background: #111;
    color: #fff;
    border: 0;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 6px 16px rgba(0,0,0,.5);
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  /* ---------- Page header text ---------- */
  .page-head {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="app">
    <header class="brand">
      <h1>bunq<span class="dot">.</span></h1>
    </header>
    <div class="rainbow-bar" aria-hidden="true"></div>

    <main class="stage">
      <div class="page-head">SplitBill · Receipt</div>

      <!-- Receipt -->
      <div class="receipt-wrap">
        <div class="receipt" id="receipt" aria-label="Generated receipt">
          <!-- Filled by JS from RECEIPT data -->
        </div>
      </div>

      <!-- QR -->
      <div class="qr-card" id="qr-card" role="group" aria-label="Payment QR">
        <div id="qr"></div>
        <div class="qr-meta">
          <div class="label">Split ID</div>
          <div class="id" id="split-id">—</div>
          <div class="hint">Scan to pay your part</div>
        </div>
      </div>
    </main>

    <!-- Floating CTA -->
    <button class="original-btn" id="open-original" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      Original receipt
    </button>

    <!-- Modal -->
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Original receipt">
      <div class="modal-card">
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
        <img src="assets/original-receipt.png" alt="Original receipt photo" />
      </div>
    </div>
  </div>

  <script>
    /* ============================================================
     * MOCK DATA — shape mirrors the future backend JSON response.
     * Swap RECEIPT for fetched JSON and re-call render().
     * ========================================================== */
    const RECEIPT = {
      splitId: "BNQ-7F3A2",
      paymentUrl: "https://bunq.example/split/BNQ-7F3A2",
      venue: "Toscanini",
      datetime: "25 Apr 2026 · 20:42",
      currency: "€",
      items: [
        { name: "Pasta al tartufo",    price: 22.50, who: "Eva"   },
        { name: "Pizza margherita",    price: 14.00, who: "Lars"  },
        { name: "Risotto ai funghi",   price: 19.75, who: "Noa"   },
        { name: "Tiramisu",            price:  9.00, who: "Noa"   },
        { name: "Bistecca fiorentina", price: 28.00, who: "Sem"   },
        { name: "Birra Moretti × 2",   price:  8.20, who: "Sem"   },
        { name: "Insalata caprese",    price: 12.40, who: "Fleur" },
        { name: "Acqua frizzante",     price:  6.00, who: "Fleur" },
      ],
      subtotal: 119.85,
      tax: 0.00,
      tip: 12.00,
      total: 131.85,
    };

    /* ============================================================
     * Helpers
     * ========================================================== */
    const fmt = (n, c = "€") => c + n.toFixed(2).replace(".", ",");

    /** Build a "leader" line: name on left, dotted leader, price on right.
     *  We compute on a fixed character grid so it looks like a real receipt. */
    const COLS = 30; // monospace columns inside the receipt
    function leader(left, right) {
      const dots = Math.max(2, COLS - left.length - right.length);
      return left + " " + ".".repeat(dots - 2) + " " + right;
    }

    /* ============================================================
     * Render — produces an array of "lines" the typewriter consumes.
     * Each line is { html, pause? } so we can mix bold/dim segments.
     * ========================================================== */
    function buildLines(data) {
      const lines = [];
      // Header
      lines.push({ html: `<div class="r-head">
          <div class="r-title">RECEIPT</div>
          <div class="r-sub">${data.venue.toUpperCase()} · ${data.datetime}</div>
        </div>`, atomic: true });

      // Items
      data.items.forEach(it => {
        lines.push({
          html: `<div class="r-row">
            <span class="r-item-name">
              <span class="name">${it.name}</span>
              <span class="who">→ ${it.who}</span>
            </span>
            <span class="price">${fmt(it.price, data.currency)}</span>
          </div>`
        });
      });

      // Divider
      lines.push({ html: `<hr class="r-divider" />`, atomic: true });

      // Totals
      lines.push({ html: row("Subtotal", fmt(data.subtotal, data.currency)) });
      if (data.tax)  lines.push({ html: row("Tax",      fmt(data.tax,  data.currency)) });
      if (data.tip)  lines.push({ html: row("Tip",      fmt(data.tip,  data.currency)) });

      lines.push({ html: `<hr class="r-divider solid" />`, atomic: true });
      lines.push({ html: `<div class="r-row grand">
        <span class="name"><strong>TOTAL</strong></span>
        <span class="price"><strong>${fmt(data.total, data.currency)}</strong></span>
      </div>` });

      lines.push({ html: `<hr class="r-divider" />`, atomic: true });
      lines.push({ html: `<div class="r-footer">SPLIT ${data.splitId} · THANK YOU</div>`, atomic: true });

      return lines;
    }

    function row(label, value) {
      return `<div class="r-row">
        <span class="name">${label}</span>
        <span class="price">${value}</span>
      </div>`;
    }

    /* ============================================================
     * Typewriter animation
     * Each line fades in (atomic) OR types char-by-char.
     * For text rows we type only the visible text portions; HTML
     * structure is inserted up front and we reveal text via clipping.
     * Approach: insert each line's HTML, then animate its `clip-path`
     * from left→right (and stagger lines top→bottom).
     * ========================================================== */
    async function typewrite(container, lines, opts = {}) {
      const linePause   = opts.linePause   ?? 60;
      const charDur     = opts.charDur     ?? 18;   // ms per char
      const atomicDur   = opts.atomicDur   ?? 220;
      const maxLineDur  = opts.maxLineDur  ?? 480;

      for (const line of lines) {
        const wrapper = document.createElement("div");
        wrapper.className = "line";
        wrapper.innerHTML = line.html;
        container.appendChild(wrapper);

        // measure approximate text length for typing duration
        const text = wrapper.textContent || "";
        const dur = line.atomic
          ? atomicDur
          : Math.min(maxLineDur, Math.max(120, text.length * charDur));

        // reveal via clip-path inset from right→0
        wrapper.style.opacity = "1";
        wrapper.style.clipPath = "inset(0 100% 0 0)";
        wrapper.style.transition = `clip-path ${dur}ms steps(${Math.max(6, Math.min(40, text.length))}, end)`;
        // force reflow so transition kicks in
        wrapper.getBoundingClientRect();
        wrapper.style.clipPath = "inset(0 0 0 0)";

        await sleep(dur + linePause);
      }
    }

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    /* ============================================================
     * QR
     * ========================================================== */
    function renderQR(url, mountId) {
      const qr = qrcode(0, "M");
      qr.addData(url);
      qr.make();
      const cells = qr.getModuleCount();
      const size = 96;
      const cell = size / cells;
      let svg = `<svg viewBox="0 0 ${cells} ${cells}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <rect width="${cells}" height="${cells}" fill="#fff"/>`;
      for (let r = 0; r < cells; r++) {
        for (let c = 0; c < cells; c++) {
          if (qr.isDark(r, c)) {
            svg += `<rect x="${c}" y="${r}" width="1" height="1" fill="#111"/>`;
          }
        }
      }
      svg += `</svg>`;
      document.getElementById(mountId).innerHTML = svg;
    }

    /* ============================================================
     * Boot
     * ========================================================== */
    async function render(data) {
      const receiptEl = document.getElementById("receipt");
      receiptEl.innerHTML = "";
      const lines = buildLines(data);

      document.getElementById("split-id").textContent = data.splitId;

      // brief pause so the empty receipt is visible first
      await sleep(350);
      await typewrite(receiptEl, lines);

      // QR after typing finishes
      renderQR(data.paymentUrl, "qr");
      await sleep(150);
      document.getElementById("qr-card").classList.add("in");
    }

    // Modal wiring
    const modal      = document.getElementById("modal");
    const openBtn    = document.getElementById("open-original");
    const closeBtn   = document.getElementById("modal-close");
    openBtn.addEventListener("click", () => {
      modal.classList.add("open");
      console.log("[SplitBill] Original receipt opened");
    });
    closeBtn.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.classList.remove("open");
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") modal.classList.remove("open");
    });

    render(RECEIPT);
  </script>
</body>
</html>
